name: 每日简报生成

on:
  schedule:
    # 北京时间 22:00 = UTC 14:00
    - cron: '0 14 * * *'
  # 允许手动触发，方便调试
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install anthropic google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: 生成简报
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
        run: python scripts/generate.py

      - name: 提交并推送 index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📰 每日简报 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          git push
